# =============================================================================
# BetterDesk Docker Images - Build & Publish to GitHub Container Registry
# =============================================================================
# This workflow builds and publishes Docker images to ghcr.io.
#
# Images published:
#   - ghcr.io/unitronix/betterdesk-server:latest  (Go server)
#   - ghcr.io/unitronix/betterdesk-console:latest (Node.js console)
#   - ghcr.io/unitronix/betterdesk:latest         (All-in-one)
#
# Triggers:
#   - Push to 'main' with changes to Dockerfile*, docker-compose*, betterdesk-server/**, web-nodejs/**
#   - Manual dispatch
#   - Release published
# =============================================================================

name: Build & Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g., v2.4.0)'
        required: false
        default: 'latest'
        type: string

  push:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - 'docker-compose*.yml'
      - 'docker/**'
      - 'betterdesk-server/**'
      - 'web-nodejs/**'
      - '.github/workflows/docker-publish.yml'

  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  # Repository name in lowercase (GitHub requirement)
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  # Opt into Node.js 24 for all actions (Node.js 20 deprecated June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================================================
  # Build Go Server Image
  # ==========================================================================
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/betterdesk-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate SBOM
        continue-on-error: true
        uses: anchore/sbom-action@v0
        env:
          SYFT_REGISTRY_AUTH_USERNAME: ${{ github.actor }}
          SYFT_REGISTRY_AUTH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image: ${{ env.IMAGE_PREFIX }}/betterdesk-server:latest
          format: spdx-json
          output-file: sbom-server.spdx.json

      - name: Trivy vulnerability scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/betterdesk-server:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  # ==========================================================================
  # Build Node.js Console Image
  # ==========================================================================
  build-console:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/betterdesk-console
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push console image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.console
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ==========================================================================
  # Build All-in-One Image
  # ==========================================================================
  build-allinone:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/betterdesk
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push all-in-one image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ==========================================================================
  # Update README on Docker Hub (if configured)
  # ==========================================================================
  update-description:
    needs: [build-server, build-console, build-allinone]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Summary
        run: |
          echo "## 🐳 Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ github.repository_owner }}/betterdesk-server\` | latest |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ github.repository_owner }}/betterdesk-console\` | latest |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ github.repository_owner }}/betterdesk\` | latest |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Start" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.quick.yml -o docker-compose.yml" >> $GITHUB_STEP_SUMMARY
          echo "docker compose up -d" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Package Visibility" >> $GITHUB_STEP_SUMMARY
          echo "If packages are newly created, they default to **private**." >> $GITHUB_STEP_SUMMARY
          echo "To allow unauthenticated pulls, change visibility to **Public**:" >> $GITHUB_STEP_SUMMARY
          echo "GitHub repo → Packages → (each package) → Package settings → Change visibility → Public" >> $GITHUB_STEP_SUMMARY
